<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced To-do Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<article class="todo-card" data-testid="test-todo-card">

  <!-- Checkbox -->
  <div class="top">
    <input type="checkbox" id="complete" data-testid="test-todo-complete-toggle">
    <label for="complete">Mark complete</label>
  </div>

  <!-- Title -->
  <h2 id="title" data-testid="test-todo-title" tabindex="0">
    Finish Project
  </h2>

  <!-- Description -->
  <p id="description" class="description collapsed"
     data-testid="test-todo-description"
     tabindex="0"
     aria-expanded="false">
     Complete the advanced todo card with all features.<br> This is a longer description to test <br> and collapse functionality.
  </p>

  <!-- Meta -->
  <div class="meta">
    <span id="priority" class="priority high" data-testid="test-todo-priority">
      High
    </span>

    <select id="status" data-testid="test-todo-status">
      <option>Pending</option>
      <option>In Progress</option>
      <option>Done</option>
    </select>
  </div>

  <!-- Time -->
  <div class="time">
    <time id="due-date" data-testid="test-todo-due-date"></time>
    <span id="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite"></span>
  </div>

  <!-- Tags -->
  <ul> <class="tags" data-testid="test-todo-tags">
    <li data-testid="test-todo-tag-work">Work</li>
   <li data-testid="test-todo-tag-urgent">Urgent</li>
  </ul>

  <!-- Buttons -->
  <div class="actions">
    <a href="indexform.html">
   <button data-testid="test-todo-edit-button" id="edit-btn">Edit</button>
   </a>
    <button data-testid="test-todo-delete-button">Delete</button>
  </div>


</article>

<script src="script.js"></script>
</body>
</html>
